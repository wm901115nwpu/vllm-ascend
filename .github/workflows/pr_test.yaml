name: E2E

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    if: ${{ github.event.action != 'labeled' || github.event.label.name == 'ready' }}
    runs-on: linux-amd64-cpu-8-hk
    container:
      image: quay.io/ascend-ci/vllm-ascend:lint
    outputs:
      main_commit: ${{ steps.vllm.outputs.main_commit }}
      release_tag: ${{ steps.vllm.outputs.release_tag }}
    steps:
      - name: Validate PR title prefix
        run: |
          PR_TITLE=$(curl -sSf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])") || {
              echo "::error::Failed to fetch PR title from GitHub API"
              exit 1
            }

          if [ -z "$PR_TITLE" ]; then
            echo "::error::PR title cannot be empty"
            exit 1
          fi

          echo "Checking PR title: $PR_TITLE"

          VALID_PREFIXES='\[(BugFix|Performance|Test|CI|Feature|Doc|Misc|Community|Refactor)\]'

          if ! echo "$PR_TITLE" | grep -iqE "$VALID_PREFIXES"; then
            echo "::error::PR title must contain one of the following prefixes: [BugFix], [Performance], [Test], [CI], [Feature], [Doc], [Misc], [Community], [Refactor]"
            echo "::error::Example: '[Feature] Add new optimization pass' or 'Add new feature [Feature]'"
            exit 1
          fi

          echo "✓ PR title prefix is valid"

      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read verified vLLM refs
        id: vllm
        run: |
          main_commit="$(tr -d '[:space:]' < .github/vllm-main-verified.commit)"
          release_tag="$(tr -d '[:space:]' < .github/vllm-release-tag.commit)"
          [[ "${main_commit}" =~ ^[0-9a-f]{7,40}$ ]] || {
            echo "::error file=.github/vllm-main-verified.commit::invalid vLLM main commit: ${main_commit}"
            exit 1
          }
          [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]] || {
            echo "::error file=.github/vllm-release-tag.commit::invalid vLLM release tag: ${release_tag}"
            exit 1
          }
          {
            echo "main_commit=${main_commit}"
            echo "release_tag=${release_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: cp problem matchers
        run: |
          cp .github/workflows/matchers/actionlint.json "$RUNNER_TEMP/actionlint.json"
          cp .github/workflows/matchers/markdownlint.json "$RUNNER_TEMP/markdownlint.json"
          cp .github/workflows/matchers/mypy.json "$RUNNER_TEMP/mypy.json"

      - run: echo "::add-matcher::$RUNNER_TEMP/actionlint.json"
      - run: echo "::add-matcher::$RUNNER_TEMP/markdownlint.json"
      - run: echo "::add-matcher::$RUNNER_TEMP/mypy.json"

      - name: Checkout vllm-project/vllm repo
        uses: actions/checkout@v7
        with:
          repository: vllm-project/vllm
          path: ./vllm-empty
          ref: ${{ steps.vllm.outputs.main_commit }}

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            lint_tracker:
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'requirements-lint.txt'

      - name: Install vllm-ascend dev (conditional)
        if: steps.filter.outputs.lint_tracker == 'true'
        env:
          UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi"
          UV_INDEX_STRATEGY: unsafe-best-match
          UV_NO_CACHE: 1
          UV_SYSTEM_PYTHON: 1
        run: |
          pip install uv
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          pip install uc-manager
          uv pip install -r requirements-dev.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Install and run Gitleaks Secret Scan
        run: |
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          chmod +x .github/workflows/scripts/gitleaks.sh
          .github/workflows/scripts/gitleaks.sh
          
      - name: Run pre-commit
        env:
          PRE_COMMIT_HOME: /tmp/pre-commit-cache
          PRE_COMMIT_COLOR: always
          FORCE_COLOR: "1"
          TERM: xterm-256color
          SHELLCHECK_OPTS: "--exclude=SC2046,SC2006,SC2086"
          # Keep golang-based pre-commit hooks on a domestic module proxy.
          GOPROXY: https://repo.huaweicloud.com/repository/goproxy/
          GONOSUMDB: '*'
        run: |
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          pre-commit run --all-files --hook-stage manual --show-diff-on-failure

      - name: Run mypy
        run: |
          PYTHONPATH="$PYTHONPATH:$(pwd)/vllm-empty"
          export PYTHONPATH
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          for python_version in "3.10" "3.11" "3.12"; do
            echo "============================"
            tools/mypy.sh 1 "$python_version"
            echo "============================"
          done

  select-tests:
    needs: pre-commit
    runs-on: linux-amd64-cpu-8-hk
    container:
      image: quay.io/ascend-ci/vllm-ascend:lint
    outputs:
      has_tests: ${{ steps.scope.outputs.has_tests || steps.noop.outputs.has_tests }}
      test_groups: ${{ steps.scope.outputs.test_groups || steps.noop.outputs.test_groups }}
      matched_modules: ${{ steps.scope.outputs.matched_modules || steps.noop.outputs.matched_modules }}
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'vllm_ascend/**'
              - 'setup.py'
              - 'csrc/**'
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'cmake/**'
              - '.github/workflows/pr_test.yaml'
              - '.github/workflows/_selected_tests.yaml'
              - '.github/workflows/scripts/select_tests.py'
              - '.github/workflows/scripts/run_selected_tests.sh'
              - '.github/workflows/scripts/test_config.yaml'
              - '.github/workflows/scripts/runner_label.json'
              - 'tests/**'
              - 'tools/**'
              - 'CMakeLists.txt'

      - name: Validate test coverage config
        run: |
          pip install pyyaml
          python3 .github/workflows/scripts/coverage.py

      - name: Select tests based on changed files
        id: scope
        if: steps.filter.outputs.src == 'true'
        run: |
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          git fetch origin ${{ github.base_ref }}
          pip install regex
          python3 .github/workflows/scripts/select_tests.py \
            --diff-base origin/${{ github.base_ref }}

      - name: Set no-tests output when source paths unchanged
        id: noop
        if: steps.filter.outputs.src != 'true'
        run: |
          {
            echo "has_tests=false"
            echo "test_groups=[]"
            echo "matched_modules="
          } >> "$GITHUB_OUTPUT"

  run-selected-tests:
    needs: [pre-commit, select-tests]
    if: ${{ needs.select-tests.outputs.has_tests == 'true' && contains(github.event.pull_request.labels.*.name, 'ready') }}
    strategy:
      matrix:
        vllm_version:
          - ${{ needs.pre-commit.outputs.main_commit }}
          - ${{ needs.pre-commit.outputs.release_tag }}
    uses: ./.github/workflows/_selected_tests.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      ref: ${{ github.event.pull_request.head.sha }}
      base_ref: ${{ github.base_ref }}
      test_groups: ${{ needs.select-tests.outputs.test_groups }}
  
  run-selected-tests-upstream:
    needs: [pre-commit, select-tests]
    if: ${{ contains(github.event.pull_request.labels.*.name, 'ready') }}
    strategy:
      matrix:
        vllm_version:
          - ${{ needs.pre-commit.outputs.main_commit }}
          - ${{ needs.pre-commit.outputs.release_tag }}
    uses: ./.github/workflows/_selected_tests_upstream.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      ref: ${{ github.event.pull_request.head.sha }}
      base_ref: ${{ github.base_ref }}
      test_groups: ${{ needs.select-tests.outputs.test_groups }}

  generate-hitest:
    name: Generate hitest recommendations
    needs: select-tests
    if: ${{ needs.select-tests.outputs.has_tests == 'true' }}
    uses: ./.github/workflows/_manual-hitest.yaml
    secrets:
      HITEST_APIG_APPCODE: ${{ secrets.HITEST_APIG_APPCODE }}
      HITEST_KEY: ${{ secrets.HITEST_KEY }}
      HITEST_SECRET: ${{ secrets.HITEST_SECRET }}

  recommend-tests-from-coverage:
    name: Recommend tests from coverage
    runs-on: linux-amd64-cpu-8-hk
    continue-on-error: true
    outputs:
      coverage_paths: ${{ steps.export-paths.outputs.coverage_paths }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout vllm-ascend scripts
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            .github/workflows/scripts
          sparse-checkout-cone-mode: false

      - name: Download test case map
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://vllm-ascend.obs.cn-north-4.myhuaweicloud.com/ci/precision-test/test_case_map.json" \
            -o test_case_map.json
          test -s test_case_map.json
          echo "Downloaded test_case_map.json"
          du -h test_case_map.json

      - name: Download coverage package and extract covstub
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://vllm-ascend.obs.cn-north-4.myhuaweicloud.com/ci/precision-test/coverage.tar" \
            -o coverage.tar
          test -s coverage.tar
          echo "Downloaded coverage.tar"
          du -h coverage.tar
          tar xf coverage.tar vllm-ascend/covstub
          test -d vllm-ascend/covstub
          echo "Extracted vllm-ascend/covstub"
          find vllm-ascend/covstub -maxdepth 2 -type d | head -20 || true

      - name: Recommend tests for current PR
        run: |
          set -euo pipefail
          if ! python3 -c "import regex" >/dev/null 2>&1; then
            echo "regex not found for $(python3 -V); bootstrapping pip and installing regex"
            curl -fsSL https://bootstrap.pypa.io/get-pip.py -o get-pip.py
            python3 get-pip.py --break-system-packages
            python3 -m pip install --break-system-packages regex
          fi
          python3 -c "import regex; print('regex ok:', regex.__file__)"
          PR_SPEC="vllm-project/vllm-ascend#${{ github.event.pull_request.number }}"
          echo "Selecting tests for PR: ${PR_SPEC}"
          python3 .github/workflows/scripts/test_selector.py \
            --github-pr "${PR_SPEC}" \
            --source-dir ./vllm-ascend/covstub \
            --map-file test_case_map.json

      - name: Export coverage paths output
        id: export-paths
        if: always()
        run: |
          FILE="recommended_pytest_paths.txt"
          if [ -f "$FILE" ]; then
            {
              echo "coverage_paths<<EOF"
              cat "$FILE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Exported $(wc -l < "$FILE") recommended paths"
          else
            echo "coverage_paths=" >> "$GITHUB_OUTPUT"
            echo "::notice::recommended_pytest_paths.txt not found"
          fi 

  # Summary gate job — use this single, stable name as the required status check
  # in GitHub branch protection rules instead of tracking individual matrix job names.
  ci-gate:
    needs: [pre-commit, select-tests, run-selected-tests]
    if: ${{ always() && contains(github.event.pull_request.labels.*.name, 'ready') }}
    runs-on: linux-amd64-cpu-2-hk
    steps:
      - name: Check all required jobs
        run: |
          set -euo pipefail

          PRE_COMMIT_RESULT="${{ needs.pre-commit.result }}"
          SELECT_TESTS_RESULT="${{ needs.select-tests.result }}"
          HAS_TESTS="${{ needs.select-tests.outputs.has_tests }}"

          echo "=== CI Gate Summary ==="
          echo "pre-commit: ${PRE_COMMIT_RESULT}"
          echo "select-tests: ${SELECT_TESTS_RESULT}"
          echo "has_tests: ${HAS_TESTS}"

          if [ "${PRE_COMMIT_RESULT}" != "success" ] && [ "${PRE_COMMIT_RESULT}" != "skipped" ]; then
            echo "::error::pre-commit did not succeed (result: ${PRE_COMMIT_RESULT})"
            exit 1
          fi

          if [ "${SELECT_TESTS_RESULT}" != "success" ] && [ "${SELECT_TESTS_RESULT}" != "skipped" ]; then
            echo "::error::select-tests did not succeed (result: ${SELECT_TESTS_RESULT})"
            exit 1
          fi

          if [ "${HAS_TESTS}" = "true" ]; then
            TESTS_RESULT="${{ needs.run-selected-tests.result }}"
            echo "run-selected-tests: ${TESTS_RESULT}"
            if [ "${TESTS_RESULT}" != "success" ]; then
              echo "::error::run-selected-tests did not succeed (result: ${TESTS_RESULT})"
              exit 1
            fi
          fi

          echo "=== CI Gate: PASSED ==="

  #this job collects failure from uploaded logs
  analyze-failure-report:
    name: Analyze failure report
    needs: [run-selected-tests, recommend-tests-from-coverage]
    if: always()
    uses: ./.github/workflows/_analyze_failure.yaml
    with:
      log_artifact_pattern: selected-test-logs-*
      recommendations_file: .github/workflows/scripts/recommended_pytest_paths.txt
      recommendations_content: ${{ needs.recommend-tests-from-coverage.outputs.coverage_paths || '' }}
