name: Selected Tests Upstream

on:
  workflow_call:
    inputs:
      vllm:
        type: string
        required: true
        description: 'The vllm commit hash or tag to test.'
      test_groups:
        type: string
        required: true
        description: 'JSON array of test groups from select_tests.py'
      ref:
        type: string
        required: false
        default: ''
        description: 'The vllm-ascend ref to test.'
      base_ref:
        type: string
        required: false
        default: 'main'
        description: 'The base branch to rebase onto (e.g. main, v0.8.x).'
      upload_timing:
        type: boolean
        required: false
        default: false
        description: 'Upload test_timing_data.json as artifact'
      continue_on_error:
        type: boolean
        required: false
        default: false
        description: 'Continue running the job even if tests fail'
      enable-coverage:
        type: boolean
        required: false
        default: false
        description: 'Whether to run tests with coverage enabled.'
    secrets:
      OBS_ACCESS_KEY_PRECISION:
        required: false
      OBS_SECRET_ACCESS_KEY_PRECISION:
        required: false


# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

# only cancel in-progress runs of the same workflow
# and ignore the lint / 1 card / 4 cards test type
concurrency:
  group: upstream-${{ github.workflow }}-${{ github.ref }}-${{ inputs.vllm }}
  cancel-in-progress: true

env:
  UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
  UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu/"
  UV_INDEX_STRATEGY: unsafe-best-match
  UV_INSECURE_HOST: cache-service.nginx-pypi-cache.svc.cluster.local
  UV_HTTP_TIMEOUT: 120
  UV_NO_CACHE: 1
  UV_SYSTEM_PYTHON: 1

jobs:
    e2e-upstream_pr:
        runs-on: linux-aarch64-a2b3-1
        strategy:
          fail-fast: false
          matrix:
            part: [0]
            image_tag: [9.0.1-910b-ubuntu22.04-py3.12]
            num_npus: [1]
        container:
          image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:${{ matrix.image_tag }}
          env:
            VLLM_LOGGING_LEVEL: ERROR
            HF_HUB_OFFLINE: 1
        steps:
          - name: Checkout vllm-project/vllm-ascend repo
            uses: actions/checkout@v7
            with:
              ref: ${{ inputs.ref || github.ref }}
              fetch-depth: 0
              submodules: recursive
          - name: Check npu and CANN info
            run: |
              npu-smi info
              cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info

          - name: Config mirrors
            run: |
              sed -Ei 's@(ports|archive).ubuntu.com@cache-service.nginx-pypi-cache.svc.cluster.local:8081@g' /etc/apt/sources.list
              pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
              pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
              apt-get update -y
              apt install git -y
              git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

          - name: Install system dependencies
            run: |
              apt-get -y install `cat packages.txt`
              apt-get -y install gcc g++ cmake libnuma-dev clang-15
              update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 20
              update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 20
              pip install uv

          - name: Checkout vllm-project/vllm repo
            uses: actions/checkout@v7
            with:
              repository: vllm-project/vllm
              ref: ${{ inputs.vllm }}
              path: ./vllm-empty
              fetch-depth: 1

          - name: Install vllm-project/vllm from source
            working-directory: ./vllm-empty
            run: |
              VLLM_TARGET_DEVICE=empty uv pip install -e .
              pip uninstall -y triton
              pip install -e tests/plugins/bge_m3_sparse_plugin
              pip install -e tests/plugins/prithvi_io_processor_plugin
              sed -i '5i\import vllm_ascend.patch.platform\nimport vllm_ascend.patch.worker' tests/conftest.py

          - name: Get csrc hash
            id: get_csrc_hash
            run: |
              CSRC_HASH=$(find ./csrc ./setup.py ./CMakeLists.txt ./cmake \
                -type f -not -path '*/.*' | sort | xargs sha256sum | sha256sum | awk '{print $1}')
              echo "CSRC_HASH=$CSRC_HASH" >> $GITHUB_OUTPUT

          - name: Get architecture
            id: get_arch
            run: |
              ARCH=$(uname -m)
              case "$ARCH" in
                x86_64) echo "arch=X64" >> $GITHUB_OUTPUT ;;
                aarch64) echo "arch=ARM64" >> $GITHUB_OUTPUT ;;
                *) echo "arch=$ARCH" >> $GITHUB_OUTPUT ;;
              esac
          
          - name: Restore vllm-ascend csrc cache
            id: cache-csrc
            uses: runs-on/cache@v5
            with:
              path: |
                vllm_ascend/_cann_ops_custom
                vllm_ascend/*.so
                vllm_ascend/lib
                vllm_ascend/include
              key: vllm-ascend-build-v1-${{ steps.get_arch.outputs.arch }}-${{ matrix.image_tag }}-${{ steps.get_csrc_hash.outputs.CSRC_HASH }}
              restore-keys: |
                vllm-ascend-build-v1-${{ steps.get_arch.outputs.arch }}-${{ matrix.image_tag }}-${{ steps.get_csrc_hash.outputs.CSRC_HASH }}
           
          - name: Install vllm-project/vllm-ascend with device
            run: |
              export MAX_JOBS=$(( ${{ matrix.num_npus }} * 23 ))
              pip install uc-manager
              uv pip install -r requirements-dev.txt
              uv pip install --force-reinstall --no-deps triton-ascend==3.2.1
              if find vllm_ascend -maxdepth 1 -name '*.so' -type f 2>/dev/null | grep -q .; then
                echo "CSRC cache hit: .so files found, skip kernel compilation"
                COMPILE_CUSTOM_KERNELS=0 uv pip install -e .
              else
                echo "CSRC cache miss: no .so files found, compile kernels"
                uv pip install -e . --no-build-isolation
              fi
              uv pip install tblib

          - name: Run vllm-project/vllm test
            working-directory: ./vllm-empty
            env:
              PYTORCH_NPU_ALLOC_CONF: max_split_size_mb:256
              VLLM_WORKER_MULTIPROC_METHOD: spawn
              TORCH_DEVICE_BACKEND_AUTOLOAD: 0
            run: |
              mkdir -p tiktoken_encodings
              curl -L -o tiktoken_encodings/o200k_base.tiktoken "https://openaipublic.blob.core.windows.net/encodings/o200k_base.tiktoken"
              curl -L -o tiktoken_encodings/cl100k_base.tiktoken "https://openaipublic.blob.core.windows.net/encodings/cl100k_base.tiktoken"
              export TIKTOKEN_ENCODINGS_BASE=${PWD}/tiktoken_encodings
              python3 ../.github/workflows/scripts/run_suite.py \
                --suite e2e-upstream_pr \
                --auto-partition-id "${{ matrix.part }}" \
                --auto-partition-size 1 \
                --continue-on-error
