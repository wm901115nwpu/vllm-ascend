# ==========================================
# ACTUAL TEST CASES
# ==========================================

test_cases:
  - name: "GLM-5.2-W8A8-DSpark"
    model: "Eco-Tech/GLM-5.2-w8a8"
    envs:
      SERVER_PORT: "DEFAULT_PORT"
      HCCL_OP_EXPANSION_MODE: "AIV"
      HCCL_BUFFSIZE: "512"
    server_cmd:
      - "--data-parallel-size"
      - "1"
      - "--tensor-parallel-size"
      - "16"
      - "--enable-expert-parallel"
      - "--port"
      - "$SERVER_PORT"
      - "--max-num-seqs"
      - "16"
      - "--max-model-len"
      - "8192"
      - "--trust-remote-code"
      - "--gpu-memory-utilization"
      - "0.9"
      - "--speculative-config"
      - '{"method": "dspark", "num_speculative_tokens": 7, "model": "RedHatAI/GLM-5.2-speculator.dspark", "enforce_eager": true}'
    benchmarks:
      perf:
        case_type: performance
        dataset_path: vllm-ascend/GSM8K-in3500-bs400
        request_conf: vllm_api_stream_chat
        dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
        num_prompts: 64
        max_out_len: 1500
        batch_size: 16
        request_rate: 0
        baseline: 1
        threshold: 0.97
