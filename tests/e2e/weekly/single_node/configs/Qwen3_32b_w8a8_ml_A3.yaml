# ==========================================
# Shared Configurations
# ==========================================

_envs: &envs
  TASK_QUEUE_ENABLE: "1"
  VLLM_USE_V1: "1"
  HCCL_OP_EXPANSION_MODE: "AIV"
_server_cmd: &server_cmd
  - "--tensor-parallel-size"
  - "4"
  - "--port"
  - "$SERVER_PORT"
  - "--distributed_executor_backend"
  - "mp"
  - "--max-num-seqs"
  - "256"
  - "--max-model-len"
  - "5500"
  - "--trust-remote-code"
  - "--quantization ascend"
  - "--reasoning-parser"
  - "qwen3"
  - "--gpu-memory-utilization"
  - "0.9"

_benchmarks_perf1: &benchmarks_perf1
    perf:
      case_type: performance
      dataset_path: vllm-ascend/GSM8K-in3500-bs2800-qwen3
      request_conf: vllm_api_stream_chat
      dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
      num_prompts: 304
      max_out_len: 1500
      batch_size: 76
      request_rate: 0
      baseline: 1326.599
      threshold: 0.95

# ==========================================
# ACTUAL TEST CASES
# ==========================================

test_cases:
  - name: "Qwen3_32b_int8_Feature_stack_A3"
    model: "vllm-ascend/Qwen3-32B-W8A8-ml"
    envs:
      <<: *envs
    server_cmd: *server_cmd
    server_cmd_extra:
      - "--max-num-batched-tokens"
      - "5500"
      - "--enforce-eager"
      - "--additional-config"
      - '{"ascend_scheduler_config":{"enabled":false},"enable_weight_nz_layout":true}'
