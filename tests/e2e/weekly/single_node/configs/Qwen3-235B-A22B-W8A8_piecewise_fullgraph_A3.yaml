# ==========================================
# Shared Configurations
# ==========================================

_envs: &envs
  TASK_QUEUE_ENABLE: "1"
  VLLM_USE_V1: "1"
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  HCCL_BUFFSIZE: "1024"
  OMP_PROC_BIND: "false"
  OMP_NUM_THREADS: "1"
  VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
  VLLM_ENGINE_READY_TIMEOUT_S: "1800"
  SERVER_PORT: "DEFAULT_PORT"

_server_cmd: &server_cmd
  - "--async-scheduling"
  - "--tensor-parallel-size"
  - "4"
  - "--data-parallel-size"
  - "4"
  - "--data-parallel-size-local"
  - "4"
  - "--data-parallel-start-rank"
  - "0"
  - "--data-parallel-rpc-port"
  - "2345"
  - "--max-num-seqs"
  - "120"
  - "--max-model-len"
  - "40960"
  - "--max-num-batched-tokens"
  - "16384"
  - "--gpu-memory-utilization"
  - "0.9"
  - "--enable-expert-parallel "
  - "--port"
  - "$SERVER_PORT"
  - "--no-enable-prefix-caching"
  - "--quantization"
  - "ascend"
  - "--trust-remote-code"
  - "--host"
  - "0.0.0.0"
  - "--data-parallel-address"
  - "0.0.0.0"

_benchmarks: &benchmarks
  acc:
    case_type: accuracy
    dataset_path: vllm-ascend/gsm8k_lite
    request_conf: vllm_api_general_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_chat_prompt
    max_out_len: 38912
    num_prompts: 32
    batch_size: 32
    baseline: 100
    threshold: 10

# ==========================================
# ACTUAL TEST CASES
# ==========================================

test_cases:
  - name: "Qwen3_235B_Accuracy_PIECEWISE_gsm8k_lite"
    model: "vllm-ascend/Qwen3-235B-A22B-W8A8"
    envs:
      <<: *envs
    server_cmd: *server_cmd
    server_cmd_extra:
      - "--compilation-config"
      - '{"cudagraph_mode": "PIECEWISE"}'
      - "--hf-overrides"
      - '{"rope_parameters": {"rope_type":"yarn","rope_theta": 1000000.0,"factor":4.3,"original_max_position_embeddings":32768}}'
      - "--additional-config"
      - '{"ascend_scheduler_config":{"enabled":false},"pa_shape_list": [4,8,16,32,48,64,96,128,160,192]}'
    benchmarks:
      <<: *benchmarks

  - name: "Qwen3_235B_Accuracy_FULL_Graph_gsm8k_lite"
    model: "vllm-ascend/Qwen3-235B-A22B-W8A8"
    envs:
      <<: *envs
    server_cmd: *server_cmd
    server_cmd_extra:
      - "--compilation-config"
      - '{"cudagraph_mode": "FULL_DECODE_ONLY"}'
      - "--hf-overrides"
      - '{"rope_parameters": {"rope_type":"yarn","rope_theta": 1000000.0,"factor":4.3,"original_max_position_embeddings":32768}}'
      - "--additional-config"
      - '{"ascend_scheduler_config":{"enabled":false},"pa_shape_list": [4,8,16,32,48,64,96,128,160,192]}'
    benchmarks:
      <<: *benchmarks
  - name: "Qwen3_235B_Accuracy_EPLB_gsm8k_lite"
    model: "vllm-ascend/Qwen3-235B-A22B-W8A8"
    envs:
      <<: *envs
      DYNAMIC_EPLB: "true"
    server_cmd: *server_cmd
    server_cmd_extra:
      - "--compilation-config"
      - '{"cudagraph_mode": "FULL_DECODE_ONLY"}'
    benchmarks:
      <<: *benchmarks
